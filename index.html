<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tridge ARK — 수출역량 상담 도구</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div class="app">

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="top-bar-left">
      <span class="logo">Tridge <strong>ARK</strong></span>
      <span class="subtitle">수출역량 상담 도구</span>
    </div>
    <div class="top-bar-right">
      <span id="meeting-date" class="badge"></span>
      <span id="provider-badge" class="badge" style="cursor:pointer" onclick="toggleApiBanner()">🤖 Claude</span>
      <button class="btn-icon" id="settings-btn" title="API 키 설정" onclick="toggleApiBanner()">⚙</button>
    </div>
  </div>

  <!-- API KEY BANNER -->
  <div id="api-banner" style="display:none;padding:.75rem 1.5rem;background:#FAEEDA;border-bottom:0.5px solid #E5A020;gap:12px;flex-wrap:wrap;align-items:center">
    <span style="font-size:12px;font-weight:700;color:#854F0B;white-space:nowrap">AI 제공사</span>
    <select id="provider-select" onchange="onProviderChange()"
      style="font-size:12px;padding:5px 8px;border:0.5px solid #ccc;border-radius:6px;background:#fff;cursor:pointer">
      <option value="claude">Claude (Anthropic)</option>
      <option value="gemini">Gemini (Google)</option>
    </select>
    <span id="claude-key-row" style="display:flex;align-items:center;gap:6px">
      <span style="font-size:11px;color:#854F0B;white-space:nowrap">API 키</span>
      <input type="password" id="claude-key-input" placeholder="sk-ant-..."
        style="font-size:12px;padding:5px 10px;border:0.5px solid #ccc;border-radius:6px;width:260px" />
    </span>
    <span id="gemini-key-row" style="display:none;align-items:center;gap:6px">
      <span style="font-size:11px;color:#854F0B;white-space:nowrap">API 키</span>
      <input type="password" id="gemini-key-input" placeholder="AIza..."
        style="font-size:12px;padding:5px 10px;border:0.5px solid #ccc;border-radius:6px;width:260px" />
    </span>
    <button onclick="saveApiKeys()"
      style="padding:5px 16px;font-size:12px;font-weight:700;background:#185FA5;color:#fff;border:none;border-radius:6px;cursor:pointer">저장</button>
    <button onclick="toggleApiBanner()"
      style="padding:5px 12px;font-size:12px;background:transparent;border:0.5px solid #ccc;border-radius:6px;cursor:pointer;color:#854F0B">닫기</button>
    <span style="font-size:10px;color:#9c9a92">키는 브라우저에만 저장됩니다</span>
  </div>

  <!-- STEP NAV -->
  <nav class="step-nav">
    <button class="step-btn active" data-step="0" onclick="goStep(0)">① 기업 사전조사</button>
    <button class="step-btn" data-step="1" onclick="goStep(1)">② 역량 진단</button>
    <button class="step-btn" data-step="2" onclick="goStep(2)">③ 바이어 전략</button>
    <button class="step-btn" data-step="3" onclick="goStep(3)">④ 액션 &amp; 리포트</button>
    <button class="step-btn" data-step="4" onclick="goStep(4)">⑤ 수출 로드맵</button>
  </nav>

  <!-- STEP 0: 기업 사전조사 -->
  <section class="panel active" id="p0">
    <p class="sec-label">AI 기업 사전조사</p>
    <div class="ai-bar">
      <input id="corp-input" placeholder="기업명 입력 (예: 농심, CJ제일제당, 오리온...)" />
      <button class="btn-ai" onclick="aiResearch()">✦ AI 조사</button>
    </div>
    <div class="ai-status" id="ai-status" style="display:none"></div>

    <div class="grid-2">
      <div class="field"><label>기업명</label><input id="f-name" placeholder="주식회사 OOO" /></div>
      <div class="field"><label>담당자 / 직책</label><input id="f-contact" placeholder="홍길동 / 수출팀장" /></div>
    </div>
    <div class="grid-3">
      <div class="field">
        <label>주요 품목</label>
        <input id="f-product" placeholder="가공식품" />
      </div>
      <div class="field">
        <label>기업 유형</label>
        <select id="f-type">
          <option>제조(가공)업체</option>
          <option>생산자(단체)</option>
          <option>수출전문업체</option>
          <option>유통업체</option>
        </select>
      </div>
      <div class="field">
        <label>수출 경력</label>
        <select id="f-exp">
          <option>미경험</option>
          <option>1~2년</option>
          <option>3~5년</option>
          <option>5~10년</option>
          <option>10년 이상</option>
        </select>
      </div>
    </div>
    <div class="grid-2">
      <div class="field">
        <label>연간 매출</label>
        <select id="f-rev">
          <option>10억 미만</option>
          <option>10~50억</option>
          <option>50~100억</option>
          <option>100~300억</option>
          <option>300억 이상</option>
        </select>
      </div>
      <div class="field">
        <label>연간 수출액</label>
        <select id="f-export">
          <option>없음</option>
          <option>10만불 미만</option>
          <option>10~50만불</option>
          <option>50~200만불</option>
          <option>200만불 이상</option>
        </select>
      </div>
    </div>
    <div class="grid-2">
      <div class="field">
        <label>주요 목표 시장</label>
        <select id="f-market">
          <option>미국/캐나다</option>
          <option>일본</option>
          <option>중국</option>
          <option>동남아</option>
          <option>유럽</option>
          <option>중동</option>
          <option>호주</option>
        </select>
      </div>
      <div class="field">
        <label>수출 방식</label>
        <select id="f-method">
          <option>직접수출</option>
          <option>수출대행</option>
          <option>직·간접 병행</option>
          <option>미정</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>핵심 제품 / USP <span class="label-hint">(AI 분석 후 수정 가능)</span></label>
      <textarea id="f-usp" rows="3" placeholder="AI가 분석한 내용이 여기에 채워집니다. 직접 수정하세요."></textarea>
    </div>
    <div class="field">
      <label>미팅 전 메모</label>
      <textarea id="f-prememo" rows="2" placeholder="사전에 파악한 특이사항, 고객사 요청, 경쟁사 정보 등..."></textarea>
    </div>
    <button class="btn-primary" onclick="goStep(1)">다음: 역량 진단 시작 →</button>
  </section>

  <!-- STEP 1: 역량 진단 -->
  <section class="panel" id="p1">
    <p class="sec-label">수출 역량 진단 — 12개 항목 (고객사와 함께 작성)</p>
    <div id="diag-list"></div>
    <div class="field" style="margin-top:1rem">
      <label>미팅 중 특이사항 / 추가 메모</label>
      <textarea id="f-meetmemo" rows="3" placeholder="고객사 반응, 추가로 파악된 정보, 논의된 내용..."></textarea>
    </div>
    <button class="btn-primary" onclick="calcAndGo()">진단 완료 → 결과 &amp; 바이어 전략 보기</button>
  </section>

  <!-- STEP 2: 바이어 전략 -->
  <section class="panel" id="p2">
    <p class="sec-label">역량 진단 결과</p>
    <div class="metric-row" id="metrics"></div>
    <div id="bars" class="bars-wrap"></div>
    <canvas id="radarMain" width="220" height="220" class="radar-canvas"></canvas>

    <p class="sec-label" style="margin-top:1.5rem">핵심 인사이트</p>
    <div id="insights-box"></div>

    <p class="sec-label" style="margin-top:1.5rem">ARK 바이어 발굴 전략</p>
    <div id="ark-strategy"></div>


    <button class="btn-primary" onclick="goStep(3)">다음: 액션 아이템 &amp; 리포트 작성 →</button>
  </section>

  <!-- STEP 3: 액션 & 리포트 -->
  <section class="panel" id="p3">
    <p class="sec-label">다음 액션 아이템</p>
    <div id="todo-list"></div>
    <button class="btn-link" onclick="addTodo()">+ 항목 추가</button>

    <div class="field" style="margin-top:1.5rem">
      <label>미팅 결론 / 종합 메모</label>
      <textarea id="f-conclusion" rows="3" placeholder="오늘 미팅의 핵심 결론, 합의된 내용, 다음 미팅 목표..."></textarea>
    </div>

    <p class="sec-label" style="margin-top:1.5rem">리포트 미리보기</p>
    <div class="report-preview" id="report-preview"></div>

    <button class="btn-pdf" onclick="downloadPdf()">⬇ PDF 리포트 다운로드</button>
    <button class="btn-outline" onclick="goStep(4)">수출 로드맵 생성하기 →</button>
  </section>

  <!-- STEP 4: 수출 로드맵 (AI 생성) -->
  <section class="panel" id="p4">
    <p class="sec-label">AI 수출 로드맵 생성</p>
    <div class="roadmap-intro">
      <p>역량 진단 결과와 기업 정보를 바탕으로 Claude AI가 맞춤형 수출 로드맵을 생성합니다.</p>
      <button class="btn-ai" id="roadmap-btn" onclick="generateRoadmap()" style="margin-top:.75rem">✦ 로드맵 생성</button>
    </div>
    <div class="ai-status" id="roadmap-status" style="display:none"></div>
    <div id="roadmap-output"></div>
  </section>

</div><!-- .app -->

<script src="js/data.js?v=20260622"></script>
<script src="js/diag.js?v=20260622"></script>
<script src="js/result.js?v=20260622"></script>
<script src="js/report.js?v=20260622"></script>
<script src="js/roadmap.js?v=20260622"></script>
<script src="js/app.js?v=20260622"></script>
</body>
</html>
